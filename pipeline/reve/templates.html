<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Furnishing Catalog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&amp;family=Outfit:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    @media print {
      @page {
        size: A4 portrait;
        margin: 12mm;
      }
      html,
      body,
      #app,
      #pages-container {
        height: auto !important;
        overflow: visible !important;
      }
      .catalog-page,
      .catalog-page.hidden { display: block !important; }
      .catalog-page {
        break-after: page;
        page-break-after: always;
      }
      .catalog-page:last-child {
        break-after: auto;
        page-break-after: avoid;
      }
      .nav-controls { display: none !important; }
    }
  </style>
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      background: #f5f0ea;
    }
  </style>
 </head>
 <body class="h-full">
  <div id="app" class="w-full h-full bg-stone-100 overflow-auto"><!-- Navigation Controls -->
   <div class="nav-controls sticky top-0 z-20 flex items-center justify-between px-6 py-3" style="background-color:#2c2a27;"><span id="nav-title" class="text-sm tracking-widest uppercase" style="font-family:'Outfit',sans-serif; color:#c8b98e;">Home Furnishing Catalog</span>
    <div class="flex items-center gap-3"><button id="prev-btn" onclick="changePage(-1)" class="p-2 rounded-full transition-colors" style="color:#c8b98e; border:1px solid #c8b98e40;" onmouseover="this.style.background='#c8b98e20'" onmouseout="this.style.background='transparent'"> <i data-lucide="chevron-left" style="width:18px;height:18px;"></i> </button> <span id="page-indicator" class="text-xs tracking-wider" style="font-family:'Outfit',sans-serif; color:#c8b98e80;">1 / 4</span> <button id="next-btn" onclick="changePage(1)" class="p-2 rounded-full transition-colors" style="color:#c8b98e; border:1px solid #c8b98e40;" onmouseover="this.style.background='#c8b98e20'" onmouseout="this.style.background='transparent'"> <i data-lucide="chevron-right" style="width:18px;height:18px;"></i> </button>
    </div>
   </div><!-- Catalog Pages Container -->
   <div id="pages-container"></div>
  </div>
  <script>
const products = [
  {
    name: "Meridian Lounge Chair",
    style: "MLC-4821",
    material: "Solid white oak frame with premium boucle upholstery, foam-core cushion with feather-down wrap",
    dimensions: 'W 32" × D 34" × H 30" | Seat Height: 17"',
    colors: ["#d4c5a9","#8b7d6b","#e8e0d0"]
  },
  {
    name: "Solstice Dining Table",
    style: "SDT-7103",
    material: "Kiln-dried American walnut top with blackened steel trestle base, hand-rubbed oil finish",
    dimensions: 'L 84" × W 40" × H 30"',
    colors: ["#5c3d2e","#2a2a2a","#8b6f4e"]
  },
  {
    name: "Aura Floor Lamp",
    style: "AFL-2259",
    material: "Hand-turned solid brass stem with linen drum shade, weighted marble base",
    dimensions: 'Base Ø 12" × H 62" | Shade Ø 18"',
    colors: ["#c4a855","#f5f0e6","#9a9a9a"]
  },
  {
    name: "Haven Modular Sofa",
    style: "HMS-9047",
    material: "Engineered hardwood frame, high-resilience foam with down-blend cushions, performance linen blend",
    dimensions: 'W 110" × D 42" × H 33" | Seat Depth: 24"',
    colors: ["#b5a999","#6b6560","#ddd5c9"]
  }
];

let currentPage = 0;

function renderPages() {
  const container = document.getElementById('pages-container');
  container.innerHTML = products.map((p, i) => `
    <div class="catalog-page ${i !== currentPage ? 'hidden' : ''}" data-page="${i}">
      <div class="max-w-4xl mx-auto px-6 py-10 md:py-14">

        <!-- Product Name Header -->
        <div class="mb-8 md:mb-12">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-px" style="background:#c8b98e;"></div>
            <span class="text-xs tracking-[0.25em] uppercase" style="font-family:'Outfit',sans-serif; color:#c8b98e;">Product ${String(i+1).padStart(2,'0')}</span>
          </div>
          <h1 class="text-3xl md:text-5xl font-semibold tracking-tight" style="font-family:'Cormorant Garamond',serif; color:#2c2a27;">${p.name}</h1>
        </div>

        <!-- Three Images Grid -->
        <div class="grid grid-cols-3 gap-3 md:gap-5 mb-8 md:mb-10">
          ${[0,1,2].map(idx => `
            <div class="aspect-[4/5] rounded-lg overflow-hidden flex items-center justify-center relative" style="background:${p.colors[idx]};">
              <div class="text-center opacity-60 p-4">
                <i data-lucide="${['armchair','image','maximize'][idx]}" style="width:32px;height:32px;color:#2c2a27;margin:0 auto 8px;display:block;"></i>
                <span class="text-xs tracking-wider uppercase block" style="font-family:'Outfit',sans-serif;color:#2c2a27;">${['Front View','Detail','Lifestyle'][idx]}</span>
              </div>
              <div class="absolute bottom-2 right-2 text-xs px-2 py-1 rounded" style="background:#2c2a2780;color:#fff;font-family:'Outfit',sans-serif;">${idx+1}/3</div>
            </div>
          `).join('')}
        </div>

        <!-- Style Number - Left Aligned -->
        <div class="mb-6 pb-6" style="border-bottom:1px solid #2c2a2715;">
          <span class="text-xs tracking-[0.2em] uppercase" style="font-family:'Outfit',sans-serif; color:#9a9189;">Style No.</span>
          <p class="text-lg font-medium mt-1" style="font-family:'Outfit',sans-serif; color:#2c2a27;">${p.style}</p>
        </div>

        <!-- Material & Dimensions -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <div class="flex items-center gap-2 mb-2">
              <i data-lucide="layers" style="width:14px;height:14px;color:#c8b98e;"></i>
              <span class="text-xs tracking-[0.2em] uppercase" style="font-family:'Outfit',sans-serif; color:#9a9189;">Material</span>
            </div>
            <p class="text-sm leading-relaxed" style="font-family:'Outfit',sans-serif; color:#4a4640;">${p.material}</p>
          </div>
          <div>
            <div class="flex items-center gap-2 mb-2">
              <i data-lucide="ruler" style="width:14px;height:14px;color:#c8b98e;"></i>
              <span class="text-xs tracking-[0.2em] uppercase" style="font-family:'Outfit',sans-serif; color:#9a9189;">Dimensions</span>
            </div>
            <p class="text-sm leading-relaxed" style="font-family:'Outfit',sans-serif; color:#4a4640;">${p.dimensions}</p>
          </div>
        </div>

      </div>
    </div>
  `).join('');
  lucide.createIcons();
  updateNav();
}

function changePage(dir) {
  const next = currentPage + dir;
  if (next < 0 || next >= products.length) return;
  currentPage = next;
  document.querySelectorAll('.catalog-page').forEach((el, i) => {
    el.classList.toggle('hidden', i !== currentPage);
  });
  updateNav();
  document.getElementById('app').scrollTop = 0;
}

function updateNav() {
  document.getElementById('page-indicator').textContent = `${currentPage+1} / ${products.length}`;
  document.getElementById('prev-btn').style.opacity = currentPage === 0 ? '0.3' : '1';
  document.getElementById('next-btn').style.opacity = currentPage === products.length-1 ? '0.3' : '1';
}

const defaultConfig = {
  catalog_title: "Home Furnishing Catalog",
  background_color: "#f5f0ea",
  surface_color: "#ffffff",
  text_color: "#2c2a27",
  accent_color: "#c8b98e",
  muted_color: "#9a9189",
  font_family: "Cormorant Garamond",
  font_size: 16
};

function applyConfig(config) {
  const bg = config.background_color || defaultConfig.background_color;
  const text = config.text_color || defaultConfig.text_color;
  const accent = config.accent_color || defaultConfig.accent_color;
  const muted = config.muted_color || defaultConfig.muted_color;
  const font = config.font_family || defaultConfig.font_family;
  const size = config.font_size || defaultConfig.font_size;
  const title = config.catalog_title || defaultConfig.catalog_title;

  document.getElementById('app').style.background = bg;
  document.getElementById('nav-title').textContent = title;

  document.querySelectorAll('h1').forEach(el => {
    el.style.color = text;
    el.style.fontFamily = `${font}, serif`;
    el.style.fontSize = `${size * 2.5}px`;
  });
  document.querySelectorAll('[data-accent]').forEach(el => el.style.color = accent);

  const allAccentEls = document.querySelectorAll('.nav-controls [style*="color"]');
  // Keep nav accent updated
  const navTitle = document.getElementById('nav-title');
  if (navTitle) navTitle.style.color = accent;
}

renderPages();
applyConfig(defaultConfig);

if (window.elementSdk && typeof window.elementSdk.init === 'function') {
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => {
      applyConfig(config);
    },
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
        { get: () => config.muted_color || defaultConfig.muted_color, set: v => { config.muted_color = v; window.elementSdk.setConfig({ muted_color: v }); } }
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
    }),
    mapToEditPanelValues: (config) => new Map([
      ["catalog_title", config.catalog_title || defaultConfig.catalog_title]
    ])
  });
}
</script>
</body>
</html>
